<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Upload</title>
</head>
<body>

    <h1 align="center">Resume Upload</h1>

    <hr>

    <h2>Upload Your Resume</h2>

    <form>

        <label>Full Name</label><br>
        <input type="text" placeholder="Enter your full name"><br><br>

        <label>Email</label><br>
        <input type="email" placeholder="Enter your email"><br><br>

        <label>Select Resume (PDF/DOC)</label><br>
        <input type="file"><br><br>

        <button type="submit">Upload Resume</button>
        <button type="reset">Clear</button>

    </form>

    <hr>

    <h3>Instructions</h3>

    <ul>
        <li>Upload only PDF or DOC files.</li>
        <li>Maximum file size: 5 MB.</li>
        <li>Keep your resume updated.</li>
    </ul>

    <hr>

    <center>
        <p><b>© 2026 Spurthy Job Portal</b></p>
    </center>

</body>
</html>
