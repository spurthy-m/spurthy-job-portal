{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Jobs - Spurthy Job Portal</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="navbar">
        <div class="logo">Spurthy Job Portal</div>

        <div class="menu">
            <a href="/">Home</a>
            <a href="/jobs/">Jobs</a>
            <a href="/about/">About</a>
            <a href="/contact/">Contact</a>
        </div>
    </div>

    <h1 style="text-align:center; margin-top:50px;">Available Jobs</h1>

    <div class="job-container">

        {% for job in jobs %}
        <div class="job-card">
            <h3>{{ job.title }}</h3>
            <p>Company: {{ job.company }}</p>
            <p>Location: {{ job.location }}</p>
            <p>{{ job.description }}</p>
            <button>Apply Now</button>
        </div>
        {% empty %}
        <p style="text-align:center;">No jobs available</p>
        {% endfor %}

    </div>

</body>
</html>
